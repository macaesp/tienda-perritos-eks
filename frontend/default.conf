server {
    listen 80;
    server_name _;

    charset utf-8;
    root /usr/share/nginx/html;
    index index.html;

    # Resolver DNS interno de Kubernetes, con TTL corto para evitar cache obsoleta
    resolver kube-dns.kube-system.svc.cluster.local valid=10s;

    # Archivos estáticos (tu SPA sencilla)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy hacia el backend, usando el Service de Kubernetes (no una IP de pod)
    location /api/ {
        set $backend tienda-backend.tienda.svc.cluster.local;
        proxy_pass http://$backend:3001;

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}